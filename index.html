<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title></title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000000;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000000;
            outline: none;
        }
        .click-tip {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: rgba(255, 255, 255, 0.9);
            font-size: 20px;
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            font-weight: 500;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            padding: 14px 28px;
            border-radius: 50px;
            z-index: 20;
            pointer-events: none;
            white-space: nowrap;
            border: 1px solid rgba(255,255,255,0.2);
            letter-spacing: 2px;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <video id="player" preload="auto" loop playsinline webkit-playsinline></video>
    <div class="click-tip" id="clickTip">点击此开始一键ROOT</div>
    <script>
        var video = document.getElementById('player');
        var tip = document.getElementById('clickTip');
        var played = false;
        var videoUrl = "https://upos-sz-mirrorhw.bilivideo.com/upgcxcode/99/91/137649199/137649199_da2-1-192.mp4?e=ig8euxZM2rNcNbNM7wdVhwdlhbKMhwdVhoNvNC8BqJIzNbfq9rVEuxTEnE8L5F6VnEsSTx0vkX8fqJeYTj_lta53NCM=&mid=0&deadline=1774533615&uipk=5&platform=html5&gen=playurlv3&og=ali&trid=adca105205c14d9dbdbc49bb060fed9h&nbs=1&os=estgoss&oi=730496913&upsig=4dd028f2384efe2437c2b48744648341&uparams=e,mid,deadline,uipk,platform,gen,og,trid,nbs,os,oi&bvc=vod&nettype=0&bw=1952049&build=0&dl=0&f=h_0_0&agrr=0&buvid=&orderid=0,1";
        
        video.src = videoUrl;
        
        function startPlay() {
            if (played) return;
            played = true;
            tip.classList.add('hidden');
            video.muted = false;
            var playPromise = video.play();
            if (playPromise !== undefined) {
                playPromise.catch(function(error) {
                    setTimeout(function() {
                        video.play().catch(function() {});
                    }, 100);
                });
            }
        }
        
        document.body.addEventListener('click', startPlay);
        document.body.addEventListener('touchstart', startPlay);
        
        video.load();
        
        video.addEventListener('canplaythrough', function() {
            if (!played) {
                video.pause();
            }
        });
    </script>
</body>
</html>
